name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Run backend lint and build
        working-directory: backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install frontend dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Run Flutter analyze
        working-directory: frontend
        run: flutter analyze
      - name: Build Flutter web
        working-directory: frontend
        run: flutter build web --release --base-href /ledgervault/ --dart-define=API_BASE_URL=https://ledgervault-z5zo.onrender.com
